{% extends "base_bootstrap.html" %}

{% block content %}

<h1>Delete Cat</h1>

<h1>Are you sure you want to delete <span style="color:red">{{ object }}</span>?</h1>
<form action="" method="post">
    {% csrf_token %}
    <input type="submit" value="Yes, delete.">
    <a href="{% url 'cats:all' %}"><input type="button" value="No, cancel."></a>
</form>

{% endblock %}
